
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube 频道聚合 | YouTube Hub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }
        .header {
            background: rgba(255,255,255,0.95);
            padding: 30px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .header h1 {
            font-size: 2.5em;
            color: #333;
            margin-bottom: 10px;
        }
        .header p {
            color: #666;
            font-size: 1.1em;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        .channel-section {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        .channel-header {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 3px solid #0f62fe;
        }
        .channel-avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0f62fe, #4589ff);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.8em;
            font-weight: bold;
            margin-right: 20px;
            box-shadow: 0 4px 15px rgba(15, 98, 254, 0.3);
        }
        .channel-info h2 {
            font-size: 1.8em;
            color: #333;
            margin-bottom: 5px;
        }
        .channel-info p {
            color: #666;
            font-size: 0.95em;
            margin-bottom: 8px;
        }
        .channel-info a {
            color: #0f62fe;
            text-decoration: none;
            font-weight: 500;
        }
        .channel-info a:hover {
            text-decoration: underline;
        }
        .videos-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 16px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
            background: #000;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        .add-channel {
            background: rgba(255,255,255,0.9);
            border: 3px dashed #667eea;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .add-channel:hover {
            background: rgba(255,255,255,1);
            border-color: #764ba2;
        }
        .add-channel h3 {
            color: #667eea;
            font-size: 1.5em;
            margin-bottom: 10px;
        }
        .add-channel p {
            color: #888;
        }
        footer {
            text-align: center;
            padding: 40px;
            color: rgba(255,255,255,0.8);
        }
        @media (max-width: 768px) {
            .header h1 { font-size: 1.8em; }
            .videos-container { grid-template-columns: 1fr; }
            .channel-header { flex-direction: column; text-align: center; }
            .channel-avatar { margin-right: 0; margin-bottom: 15px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📺 YouTube 频道聚合</h1>
        <p>追踪你喜爱的 YouTube 频道，一站式查看最新视频</p>
    </div>
    
    <div class="container">
        <!-- IBM Technology 频道 -->
        <div class="channel-section">
            <div class="channel-header">
                <div class="channel-avatar">I</div>
                <div class="channel-info">
                    <h2>IBM Technology</h2>
                    <p>IBM's official technology channel covering AI, cloud, quantum computing and enterprise solutions</p>
                    <a href="https://youtube.com/@IBMTechnology" target="_blank">
                        🔗 youtube.com/@IBMTechnology
                    </a>
                </div>
            </div>
            
            <div class="videos-container">
                <!-- 最新视频 -->
                <div class="video-wrapper">
                    <iframe src="https://www.youtube.com/embed?listType=playlist&list=UUCKWaEZ-_VweaEx1UEiP2M8g&index=1" 
                            allowfullscreen 
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture">
                    </iframe>
                </div>
                
                <div class="video-wrapper">
                    <iframe src="https://www.youtube.com/embed?listType=playlist&list=UUCKWaEZ-_VweaEx1UEiP2M8g&index=2" 
                            allowfullscreen
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture">
                    </iframe>
                </div>
                
                <div class="video-wrapper">
                    <iframe src="https://www.youtube.com/embed?listType=playlist&list=UUCKWaEZ-_VweaEx1UEiP2M8g&index=3" 
                            allowfullscreen
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture">
                    </iframe>
                </div>
            </div>
        </div>
        
        <!-- 添加更多频道 -->
        <div class="add-channel" onclick="alert('编辑 config.json 添加更多频道')">
            <h3>➕ 添加新频道</h3>
            <p>点击添加更多 YouTube 频道到聚合页面</p>
        </div>
    </div>
    
    <footer>
        <p>🦞 Generated by OpenClaw AI | Auto-updates with YouTube</p>
    </footer>
</body>
</html>
